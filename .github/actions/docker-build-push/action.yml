name: Docker Build and Push
description: BuildKit + gha cache + GHCR login + sha-tag. Extracted from steveackleyorg deploy.yml build-and-push job.

inputs:
  registry:
    required: false
    default: ghcr.io
  image-name:
    description: Full image path minus registry (e.g. owner/repo-api).
    required: true
  context:
    required: false
    default: "."
  dockerfile:
    required: false
    default: ./Dockerfile
  build-args:
    description: Multi-line KEY=VALUE for --build-arg.
    required: false
    default: ""
  short-sha:
    description: Short SHA for the :sha-<short> tag. If empty, computed from github.sha.
    required: false
    default: ""
  push-latest:
    required: false
    default: "false"
  platforms:
    required: false
    default: linux/amd64
  github-token:
    description: GITHUB_TOKEN for GHCR login.
    required: true

outputs:
  short-sha:
    description: 8-char short SHA actually used.
    value: ${{ steps.sha.outputs.short }}
  image-ref:
    description: Fully-qualified digest-pinned image ref.
    value: ${{ steps.meta.outputs.ref }}

runs:
  using: composite
  steps:
    - id: sha
      shell: bash
      run: |
        if [ -n "${{ inputs.short-sha }}" ]; then
          SHORT="${{ inputs.short-sha }}"
        else
          SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
        fi
        echo "short=$SHORT" >> "$GITHUB_OUTPUT"

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - id: tags
      shell: bash
      run: |
        IMG="${{ inputs.registry }}/${{ inputs.image-name }}"
        TAGS="$IMG:sha-${{ steps.sha.outputs.short }}"
        if [ "${{ inputs.push-latest }}" = "true" ]; then
          TAGS="$TAGS,$IMG:latest"
        fi
        {
          echo "tags<<EOF"
          echo "$TAGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - id: build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        platforms: ${{ inputs.platforms }}
        tags: ${{ steps.tags.outputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - id: meta
      shell: bash
      run: |
        REF="${{ inputs.registry }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}"
        echo "ref=$REF" >> "$GITHUB_OUTPUT"
        echo "Pushed: $REF"
