name: CI (Node)

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22"
      workspace:
        description: Optional npm workspace (e.g. apps/site). Scopes commands to it.
        required: false
        type: string
        default: ""
      run-postgres:
        required: false
        type: boolean
        default: false
      build-docker:
        required: false
        type: boolean
        default: true
      dockerfile:
        required: false
        type: string
        default: Dockerfile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-typecheck-test:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ inputs.run-postgres && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.pm.outputs.pm == 'pnpm'

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.pm.outputs.pm }}

      - name: Install
        run: |
          case "${{ steps.pm.outputs.pm }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *)    npm ci ;;
          esac

      - name: Lint
        run: |
          PM=${{ steps.pm.outputs.pm }}
          WS="${{ inputs.workspace }}"
          if [ -n "$WS" ]; then
            case "$PM" in
              pnpm) pnpm --filter "$WS" lint ;;
              yarn) yarn workspace "$WS" lint ;;
              *)    npm run lint -w "$WS" ;;
            esac
          else
            $PM run lint
          fi

      - name: Typecheck
        run: |
          PM=${{ steps.pm.outputs.pm }}
          WS="${{ inputs.workspace }}"
          if [ -n "$WS" ]; then
            case "$PM" in
              pnpm) pnpm --filter "$WS" typecheck 2>/dev/null || npx tsc --noEmit ;;
              yarn) yarn workspace "$WS" typecheck 2>/dev/null || npx tsc --noEmit ;;
              *)    npm run typecheck -w "$WS" 2>/dev/null || npx tsc --noEmit ;;
            esac
          else
            $PM run typecheck 2>/dev/null || npx tsc --noEmit
          fi

      - name: Test
        run: |
          PM=${{ steps.pm.outputs.pm }}
          WS="${{ inputs.workspace }}"
          if [ -n "$WS" ]; then
            case "$PM" in
              pnpm) pnpm --filter "$WS" test ;;
              yarn) yarn workspace "$WS" test ;;
              *)    npm run test -w "$WS" ;;
            esac
          else
            $PM test
          fi
        env:
          DATABASE_URL: "postgresql://testuser:testpassword@localhost:5432/test_db"

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: inputs.build-docker
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ inputs.project-name }}:ci
