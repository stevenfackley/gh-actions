name: CI (Node)

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22"
      workspace:
        description: Optional npm workspace (e.g. apps/site). Scopes commands to it.
        required: false
        type: string
        default: ""
      run-postgres:
        required: false
        type: boolean
        default: false
      build-docker:
        required: false
        type: boolean
        default: true
      dockerfile:
        required: false
        type: string
        default: Dockerfile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-typecheck-test:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ inputs.run-postgres && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: |
          if [ -n "${{ inputs.workspace }}" ]; then
            npm run lint -w ${{ inputs.workspace }}
          else
            npm run lint
          fi

      - name: Typecheck
        run: |
          if [ -n "${{ inputs.workspace }}" ]; then
            npm run typecheck -w ${{ inputs.workspace }} 2>/dev/null || npx tsc --noEmit
          else
            npm run typecheck 2>/dev/null || npx tsc --noEmit
          fi

      - name: Test
        run: |
          if [ -n "${{ inputs.workspace }}" ]; then
            npm run test -w ${{ inputs.workspace }}
          else
            npm test
          fi
        env:
          DATABASE_URL: "postgresql://testuser:testpassword@localhost:5432/test_db"

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: inputs.build-docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ inputs.project-name }}:ci
