name: CI (Python)

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.11"
      run-postgres:
        required: false
        type: boolean
        default: false
      system-packages:
        description: apt-get packages to install (space-separated).
        required: false
        type: string
        default: ""
      pytest-args:
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ inputs.run-postgres && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        run: pip install --upgrade uv

      - name: Install system packages
        if: inputs.system-packages != ''
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ inputs.system-packages }}

      - name: Install project deps
        run: |
          if [ -f pyproject.toml ]; then
            uv pip install --system -e ".[dev]" 2>/dev/null || uv pip install --system -e "."
            uv pip install --system pytest pytest-asyncio ruff httpx
          elif [ -f requirements-test.txt ]; then
            uv pip install --system -r requirements-test.txt
          elif [ -f requirements.txt ]; then
            uv pip install --system -r requirements.txt
            uv pip install --system pytest ruff
          else
            echo "::error::No pyproject.toml / requirements*.txt found." && exit 1
          fi

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest ${{ inputs.pytest-args }}
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
