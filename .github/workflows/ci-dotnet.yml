name: CI (.NET)

on:
  workflow_call:
    inputs:
      project-name:
        description: Project name (e.g. MyService); used for artifact names.
        required: true
        type: string
      solution-path:
        description: Path to .sln or .slnx. Defaults to finding one at repo root.
        required: false
        type: string
        default: ""
      run-postgres:
        description: Start a Postgres 16 service container for integration tests.
        required: false
        type: boolean
        default: false
      aot-rid:
        description: RID for AOT publish verification. Set empty to skip AOT.
        required: false
        type: string
        default: "linux-musl-x64"
      runs-on:
        description: Runner label.
        required: false
        type: string
        default: "ubuntu-latest"
      treat-warnings-as-errors:
        required: false
        type: boolean
        default: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve-solution:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      solution: ${{ steps.find.outputs.solution }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        shell: bash
        run: |
          if [ -n "${{ inputs.solution-path }}" ]; then
            echo "solution=${{ inputs.solution-path }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SOL=$(find . -maxdepth 3 \( -name '*.slnx' -o -name '*.sln' \) | head -n1)
          if [ -z "$SOL" ]; then
            echo "::error::No .sln or .slnx found. Pass solution-path explicitly." && exit 1
          fi
          echo "solution=${SOL#./}" >> "$GITHUB_OUTPUT"

  build-test:
    name: Build & Test
    runs-on: ${{ inputs.runs-on }}
    needs: resolve-solution
    services:
      postgres:
        image: ${{ inputs.run-postgres && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ${{ needs.resolve-solution.outputs.solution }}

      - name: Format (verify)
        continue-on-error: true
        run: dotnet format ${{ needs.resolve-solution.outputs.solution }} --verify-no-changes --no-restore

      - name: Build
        run: |
          if [ "${{ inputs.treat-warnings-as-errors }}" = "true" ]; then
            dotnet build ${{ needs.resolve-solution.outputs.solution }} --no-restore -c Release /p:TreatWarningsAsErrors=true
          else
            dotnet build ${{ needs.resolve-solution.outputs.solution }} --no-restore -c Release
          fi

      - name: Test
        run: dotnet test ${{ needs.resolve-solution.outputs.solution }} --no-build -c Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=test_db;Username=test;Password=test"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project-name }}-test-results
          path: "**/*.trx"
          retention-days: 7

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project-name }}-coverage
          path: "**/coverage.cobertura.xml"
          retention-days: 7

  dependency-audit:
    name: Dependency & Telemetry Audit
    runs-on: ${{ inputs.runs-on }}
    needs: [resolve-solution, build-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore ${{ needs.resolve-solution.outputs.solution }}

      - name: Check for known vulnerabilities
        run: dotnet list ${{ needs.resolve-solution.outputs.solution }} package --vulnerable --include-transitive

      - name: Verify no banned telemetry packages
        shell: bash
        run: |
          BANNED="ApplicationInsights|Sentry|Segment|Mixpanel|Datadog|NewRelic|Raygun|Rollbar|Bugsnag|HockeyApp|AppCenter|GoogleAnalytics"
          if grep -rEi "$BANNED" src/ --include="*.csproj" 2>/dev/null; then
            echo "::error::Banned telemetry/analytics package detected."
            exit 1
          fi
          echo "No banned telemetry packages."

      - name: Secret-shape grep
        shell: bash
        run: |
          PATTERNS='InstrumentationKey=|https://[a-f0-9]+@[a-z0-9]+\.ingest\.sentry\.io|AKIA[0-9A-Z]{16}|xoxb-[0-9]+-[0-9]+-[a-zA-Z0-9]+|-----BEGIN (RSA|OPENSSH|EC) PRIVATE KEY-----'
          if git grep -nIE "$PATTERNS" -- ':(exclude).env.example' ':(exclude)docs/**' 2>/dev/null; then
            echo "::error::Possible secret committed."
            exit 1
          fi
          echo "No secret-shaped strings found."

  aot-publish:
    name: Native AOT Publish (${{ inputs.aot-rid }})
    runs-on: ${{ inputs.runs-on }}
    needs: [resolve-solution, build-test]
    if: inputs.aot-rid != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: AOT publish
        run: |
          ENTRY=$(find src -maxdepth 3 -name '*.csproj' | xargs grep -l '<OutputType>Exe</OutputType>' 2>/dev/null | head -n1 || true)
          if [ -z "$ENTRY" ]; then
            ENTRY=$(find src -maxdepth 3 -name '*.csproj' | head -n1)
          fi
          echo "Publishing $ENTRY for ${{ inputs.aot-rid }}"
          dotnet publish "$ENTRY" -c Release -r ${{ inputs.aot-rid }} /p:PublishAot=true /p:StripSymbols=true
