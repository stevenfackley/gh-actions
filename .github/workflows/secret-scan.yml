name: Secret Scan

# Extracted from axon-main's zero-knowledge telemetry ban + AKIA/PEM patterns.
# Call from a repo's ci chain or as a standalone job on PRs.

on:
  workflow_call:
    inputs:
      banned-packages:
        description: Pipe-separated regex of banned package names (checked in csproj/package.json/pyproject).
        required: false
        type: string
        default: "ApplicationInsights|Sentry|Segment|Mixpanel|Datadog|NewRelic|Raygun|Rollbar|Bugsnag|HockeyApp|AppCenter|GoogleAnalytics"
      paths:
        description: Space-separated paths to scan for secret-shaped strings.
        required: false
        type: string
        default: "src"
      strict-packages:
        description: Fail on banned package match.
        required: false
        type: boolean
        default: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Banned-package scan
        shell: bash
        run: |
          BANNED='${{ inputs.banned-packages }}'
          FAIL=0
          for glob in '*.csproj' 'package.json' 'pyproject.toml' 'requirements*.txt'; do
            MATCHES=$(git ls-files "$glob" | xargs -r grep -lEi "$BANNED" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Banned package match in: $MATCHES"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ] && [ "${{ inputs.strict-packages }}" = "true" ]; then exit 1; fi

      - name: Secret-shape scan
        shell: bash
        run: |
          PATTERNS='InstrumentationKey=|https://[a-f0-9]+@[a-z0-9]+\.ingest\.sentry\.io|AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|xoxb-[0-9]+-[0-9]+-[a-zA-Z0-9]+|sk_live_[0-9a-zA-Z]+|sk-ant-[0-9a-zA-Z_-]+|ghp_[0-9a-zA-Z]{36,}|-----BEGIN (RSA|OPENSSH|EC|PGP) PRIVATE KEY-----'
          HITS=$(git grep -nIE "$PATTERNS" ${{ inputs.paths }} -- ':(exclude).env.example' ':(exclude)docs/**' 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "::error::Possible secret committed:"
            echo "$HITS"
            exit 1
          fi
          echo "No secret-shaped strings found."
